name: package-vscode-extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build VSIX
        run: npx --yes @vscode/vsce package --out realtime-dev-agent.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: realtime-dev-agent-vsix
          path: realtime-dev-agent.vsix

      - name: Publish VSIX to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: realtime-dev-agent.vsix
