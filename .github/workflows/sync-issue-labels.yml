name: sync-issue-labels

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels from manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const manifestPath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'labels.json');
            const desired = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existingByName = new Map(existing.map((label) => [label.name, label]));

            for (const label of desired) {
              const current = existingByName.get(label.name);

              if (!current) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`created label ${label.name}`);
                continue;
              }

              const normalizedCurrentColor = String(current.color || '').toLowerCase();
              const normalizedDesiredColor = String(label.color || '').toLowerCase();
              const currentDescription = current.description || '';
              const desiredDescription = label.description || '';

              if (
                normalizedCurrentColor === normalizedDesiredColor &&
                currentDescription === desiredDescription
              ) {
                core.info(`label ${label.name} already up to date`);
                continue;
              }

              await github.rest.issues.updateLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: current.name,
                new_name: label.name,
                color: label.color,
                description: label.description,
              });
              core.info(`updated label ${label.name}`);
            }
