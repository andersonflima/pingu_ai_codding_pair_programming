name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/lazyvim-runtime-hardening

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Elixir runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y elixir

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test
