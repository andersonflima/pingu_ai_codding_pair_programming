name: npm-publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm CLI
        run: npm install -g npm@latest

      - name: Install Elixir runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y elixir

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Test
        run: npm run check

      - name: Resolve publish version
        id: package
        shell: bash
        run: |
          name="$(node -p "require('./package.json').name")"
          published_versions="$(npm view "${name}" versions --json 2>/dev/null || echo '[]')"
          version="$(PUBLISHED_VERSIONS="${published_versions}" node <<'NODE'
          const fs = require('fs');

          const manifest = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const publishedVersions = JSON.parse(process.env.PUBLISHED_VERSIONS || '[]');
          const published = new Set((Array.isArray(publishedVersions) ? publishedVersions : [publishedVersions])
            .map((version) => String(version || '').trim())
            .filter(Boolean));

          const parseVersion = (version) => {
            const match = String(version || '').trim().match(/^(\d+)\.(\d+)\.(\d+)$/);
            return match
              ? { major: Number(match[1]), minor: Number(match[2]), patch: Number(match[3]) }
              : null;
          };

          const formatVersion = ({ major, minor, patch }) => `${major}.${minor}.${patch}`;
          const compareVersions = (left, right) =>
            left.major - right.major || left.minor - right.minor || left.patch - right.patch;
          const incrementPatch = ({ major, minor, patch }) => ({ major, minor, patch: patch + 1 });

          const declaredVersion = parseVersion(manifest.version);
          const latestPublished = [...published]
            .map(parseVersion)
            .filter(Boolean)
            .sort(compareVersions)
            .at(-1);

          if (!declaredVersion && !latestPublished) {
            throw new Error(`Invalid package.json version: ${manifest.version}`);
          }

          let candidate = declaredVersion && (!latestPublished || compareVersions(declaredVersion, latestPublished) > 0)
            ? declaredVersion
            : incrementPatch(latestPublished || declaredVersion);

          while (published.has(formatVersion(candidate))) {
            candidate = incrementPatch(candidate);
          }

          process.stdout.write(formatVersion(candidate));
          NODE
          )"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          npm version "${version}" --no-git-tag-version --allow-same-version

          echo "Publishing ${name}@${version}"

      - name: Publish to npm with Trusted Publisher
        if: env.HAS_NPM_TOKEN != 'true'
        run: npm publish --access public

      - name: Publish to npm with token
        if: env.HAS_NPM_TOKEN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
